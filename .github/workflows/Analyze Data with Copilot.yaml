name: Analyze Data with Copilot

on:
  workflow_run:
    workflows: ["Monthly Data Refresh"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  analyze-data:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.1'

      - name: Install Copilot CLI
        run: |
          npm install -g @github/copilot

      - name: Generate Track A analysis prompt
        run: |
          python << 'EOF'
          import json
          from pathlib import Path
          import sys

          # Load processed data
          processed_dir = Path("aso_workflow/data/processed")
          guides_dir = Path("reference_documents/track_a_keyword_gaps")

          # Read the analysis guide
          with open(guides_dir / "analysis_guide.md") as f:
              guide = f.read()

          # Load keyword gaps data
          gaps_files = {
              "ios": processed_dir / "keyword_gaps_ios_547702041.json",
              "android": processed_dir / "keyword_gaps_android_com.tinder.json"
          }

          data = {}
          for platform, file in gaps_files.items():
              if file.exists():
                  with open(file) as f:
                      data[platform] = json.load(f)
              else:
                  print(f"Warning: {file} not found", file=sys.stderr)

          # Create prompt embedding the analysis guide + data
          prompt = f"""You are a Senior ASO Specialist. Analyze the following keyword gap data according to this analysis guide:

          {guide}

          ## PROCESSED DATA TO ANALYZE

          iOS Keyword Gaps:
          {json.dumps(data.get('ios', {}), indent=2)}

          Android Keyword Gaps:
          {json.dumps(data.get('android', {}), indent=2)}

          Generate the complete HTML report as specified in the guide. Return ONLY the valid HTML file.
          """

          # Save prompt
          with open("track_a_analysis_prompt.txt", "w") as f:
              f.write(prompt)

          print("✓ Track A analysis prompt generated")
          EOF

      - name: Generate Track B analysis prompt
        run: |
          python << 'EOF'
          import json
          from pathlib import Path
          import sys

          # Load processed data
          processed_dir = Path("aso_workflow/data/processed")
          guides_dir = Path("reference_documents/track_b_ab_test_inference")

          # Read the analysis guide
          with open(guides_dir / "analysis_guide.md") as f:
              guide = f.read()

          # Load A/B test history data
          ab_history_file = processed_dir / "ab_history_android_com.tinder.json"

          data = {}
          if ab_history_file.exists():
              with open(ab_history_file) as f:
                  data = json.load(f)
          else:
              print(f"Warning: {ab_history_file} not found", file=sys.stderr)

          # Create prompt embedding the analysis guide + data
          prompt = f"""You are a Senior ASO Specialist. Analyze the following A/B test data according to this analysis guide:

          {guide}

          ## PROCESSED DATA TO ANALYZE

          A/B Test History:
          {json.dumps(data, indent=2)}

          Generate the complete HTML report as specified in the guide. Return ONLY the valid HTML file.
          """

          # Save prompt
          with open("track_b_analysis_prompt.txt", "w") as f:
              f.write(prompt)

          print("✓ Track B analysis prompt generated")
          EOF

      - name: Create reports directory
        run: mkdir -p aso_workflow/reports

      - name: Analyze with Copilot - Track A
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_TOKEN }}
        run: |
          copilot -p "$(cat track_a_analysis_prompt.txt)" \
            --no-ask-user \
            > aso_workflow/reports/track_a_analysis_report.html

      - name: Analyze with Copilot - Track B
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_TOKEN }}
        run: |
          copilot -p "$(cat track_b_analysis_prompt.txt)" \
            --no-ask-user \
            > aso_workflow/reports/track_b_analysis_report.html

      - name: Commit and push analysis reports
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f "aso_workflow/reports/track_a_analysis_report.html" ] || [ -f "aso_workflow/reports/track_b_analysis_report.html" ]; then
            git add aso_workflow/reports/
            git commit -m "chore: add analysis reports from Copilot [$(date -u +'%Y-%m-%d %H:%M:%S UTC')]"
            git push https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          else
            echo "No analysis reports generated"
          fi

      - name: Upload analysis artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-reports
          path: aso_workflow/reports/*.html
          retention-days: 30
          if-no-files-found: ignore